<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Well Inventory</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script>

        function calculateRow(row) {

            let opening =
                parseInt(row.querySelector('.opening').value) || 0;

            let received =
                parseInt(row.querySelector('.received').value) || 0;

            let closing =
                parseInt(row.querySelector('.closing').value) || 0;

            let price =
                parseFloat(row.querySelector('.price').value) || 0;

            let sale =
                (opening + received) - closing;

            let amount =
                sale * price;

            row.querySelector('.sale').value = sale;

            row.querySelector('.amount').value =
                amount.toFixed(2);
        }

        function initRows() {

            document.querySelectorAll("tbody tr")
                .forEach(row => {
                    calculateRow(row);
                });
        }

        window.onload = initRows;

    </script>

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card p-3 shadow">

        <h3 class="mb-4">
            Well Closing Entry
        </h3>

        <form th:action="@{/well/closing/{sessionId}/{wellId}
            (sessionId=${sessionId}, wellId=${wellId})}"
              method="post">

            <div class="table-responsive">

                <table class="table table-bordered">

                    <thead class="table-dark">

                    <tr>

                        <th>Brand</th>

                        <th>Size</th>

                        <th>Opening</th>

                        <th>Received</th>

                        <th>Closing</th>

                        <th>Sale</th>

                        <th>Price</th>

                        <th>Amount</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="item : ${wellInventory}">

                        <!-- BRAND -->
                        <td>

                            <span th:text="${item.brandSize.brand.brandName}"></span>

                            <input type="hidden"
                                   name="brandSizeId"
                                   th:value="${item.brandSize.brandSizeId}">

                        </td>

                        <!-- SIZE -->
                        <td>

                            <span th:text="${item.brandSize.sizeMl + ' ML'}"></span>

                        </td>

                        <!-- OPENING -->
                        <td>

                            <input class="form-control opening"
                                   th:value="${item.openingStock}"
                                   readonly>

                        </td>

                        <!-- RECEIVED -->
                        <td>

                            <input class="form-control received"
                                   th:value="${item.receivedStock}"
                                   readonly>

                        </td>

                        <!-- CLOSING -->
                        <td>

                            <input class="form-control closing"
                                   name="closingStock"
                                   type="number"
                                   min="0"
                                   oninput="calculateRow(this.closest('tr'))"
                                   required>

                        </td>

                        <!-- SALE -->
                        <td>

                            <input class="form-control sale"
                                   readonly>

                        </td>

                        <!-- PRICE -->
                        <td>

                            <input class="form-control price"
                                   th:value="${priceMap[item.brandSize.brandSizeId]}"
                                   readonly>

                        </td>

                        <!-- AMOUNT -->
                        <td>

                            <input class="form-control amount"
                                   readonly>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <button class="btn btn-success w-100 mt-3">

                Save & Continue →

            </button>

        </form>

    </div>

</div>

</body>

</html>
