<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Well Inventory</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <script>
        function calculateWellSale(row) {
            let opening = parseInt(row.querySelector('.opening').value) || 0;
            let received = parseInt(row.querySelector('.received').value) || 0;
            let closing = parseInt(row.querySelector('.closing').value) || 0;

            row.querySelector('.sale').value = (opening + received) - closing;
        }

        function initSales() {
            document.querySelectorAll("tbody tr").forEach(row => {
                calculateWellSale(row);
            });
        }

        window.onload = initSales;
    </script>

    <style>
        body {
            background: #f5f7fb;
        }

        .card {
            border-radius: 16px;
        }

        .table th {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            vertical-align: middle;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .badge-completed {
            background: #198754;
        }

        .badge-progress {
            background: #ffc107;
            color: black;
        }

        .progress {
            height: 10px;
        }

        .table-success {
            background-color: #e9f7ef !important;
        }

        .btn-lg {
            font-size: 18px;
            padding: 12px;
        }
    </style>
</head>

<body>

<!-- 🔝 HEADER -->
<div class="sticky-header py-3 px-4 shadow-sm">
    <div class="d-flex justify-content-between align-items-center">

        <div>
            <h4 class="mb-0">
                🧾 Well Closing Entry
            </h4>
            <small class="text-muted">
                Session ID: <strong th:text="${sessionId}"></strong>
            </small>
        </div>

        <div class="d-flex gap-2">

            <a th:href="@{'/well/select/' + ${sessionId}}"
               class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back
            </a>

            <a th:href="@{'/sessions/summary/' + ${sessionId}}"
               class="btn btn-primary">
                <i class="bi bi-bar-chart"></i> Report
            </a>

        </div>

    </div>
</div>

<!-- 📦 MAIN -->
<div class="container mt-4">

    <!-- 📊 PROGRESS -->
    <div class="card shadow-sm mb-3 p-3">

        <div class="d-flex justify-content-between">
            <span class="fw-semibold">Session Progress</span>
            <span th:text="${progress + '%'}"></span>
        </div>

        <div class="progress mt-2">
            <div class="progress-bar bg-success"
                 role="progressbar"
                 th:style="'width:' + ${progress} + '%'">
            </div>
        </div>

    </div>

    <!-- ℹ INFO -->
    <div class="alert alert-info d-flex align-items-center gap-2">
        <i class="bi bi-info-circle"></i>
        <span>
            After saving, you will be automatically redirected to the next pending well.
        </span>
    </div>

    <!-- 🧾 FORM CARD -->
    <div class="card shadow p-3">

        <form th:action="@{/well/closing/{sessionId}/{wellId}
                (sessionId=${sessionId}, wellId=${wellId})}"
              method="post">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>Brand</th>
                        <th>Opening</th>
                        <th>Received</th>
                        <th>Closing</th>
                        <th>Sale</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${wellInventory}"
                        th:classappend="${item.status.name() == 'COMPLETED'} ? 'table-success'">

                        <!-- BRAND -->
                        <td>
                            <div class="fw-semibold"
                                 th:text="${item.brand.brandName}">
                            </div>

                            <input type="hidden"
                                   name="brandId"
                                   th:value="${item.brand.brandId}">
                        </td>

                        <!-- OPENING -->
                        <td>
                            <input class="form-control opening"
                                   th:value="${item.openingStock}"
                                   readonly>
                        </td>

                        <!-- RECEIVED -->
                        <td>
                            <input class="form-control received"
                                   th:value="${item.receivedStock}"
                                   readonly>
                        </td>

                        <!-- CLOSING -->
                        <td>
                            <input class="form-control closing"
                                   name="closingStock"
                                   type="number"
                                   min="0"
                                   required
                                   th:readonly="${item.status.name() == 'COMPLETED'}"
                                   oninput="calculateWellSale(this.closest('tr'))">
                        </td>

                        <!-- SALE -->
                        <td>
                            <input class="form-control sale" readonly>
                        </td>

                        <!-- STATUS -->
                        <td>
                            <span th:if="${item.status.name() == 'COMPLETED'}"
                                  class="badge badge-completed">
                                Completed
                            </span>

                            <span th:if="${item.status.name() != 'COMPLETED'}"
                                  class="badge badge-progress">
                                In Progress
                            </span>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <!-- SAVE BUTTON -->
            <div class="mt-3">
                <button type="submit"
                        class="btn btn-success btn-lg w-100">
                    <i class="bi bi-check-circle"></i>
                    Save & Continue →
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
