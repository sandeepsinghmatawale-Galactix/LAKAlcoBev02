<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>My Wells</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fb;
}

.page-header{
    background:white;
    padding:20px;
    margin-bottom:25px;
    border-bottom:1px solid #ddd;
}

.card{
    border:none;
    border-radius:12px;
}

.status-active{
    color:#198754;
    font-weight:700;
}

.status-inactive{
    color:#dc3545;
    font-weight:700;
}

.empty-box{
    padding:40px;
    text-align:center;
    color:#888;
    border:1px dashed #ddd;
    border-radius:12px;
    background:white;
}
</style>
</head>

<body>

<div class="page-header">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div>
            <h3>🍻 My Wells</h3>
            <p class="text-muted mb-0">
                Wells configured for your current selected store.
            </p>
        </div>

        <button class="btn btn-secondary"
                onclick="window.location='/bar/dashboard'">
            ← Back to Dashboard
        </button>
    </div>
</div>

<div class="container">

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">
                    Total Wells:
                    <span th:text="${#lists.size(wells)}">0</span>
                </h5>

                <span class="badge bg-primary">
                    Bar ID:
                    <span th:text="${barId}">1</span>
                </span>
            </div>

            <div th:if="${#lists.isEmpty(wells)}" class="empty-box">
                No wells are configured for this store.
            </div>

            <div th:unless="${#lists.isEmpty(wells)}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Well ID</th>
                        <th>Well Name</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="well : ${wells}">
                        <td th:text="${well.wellId}">1</td>

                        <td>
                            <strong th:text="${well.wellName}">Main Bar</strong>
                        </td>

                        <td>
                            <span th:if="${well.active}" class="status-active">
                                Active
                            </span>

                            <span th:unless="${well.active}" class="status-inactive">
                                Inactive
                            </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
