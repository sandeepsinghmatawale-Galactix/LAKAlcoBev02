<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Inventory Report</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;margin:0;background:#f4f6f9;color:#333}
header{background:white;padding:16px 30px;border-bottom:2px solid #ddd;display:flex;justify-content:space-between;align-items:center}
main{padding:30px}
.card{background:white;border:1px solid #e0e0e0;border-radius:10px;padding:22px;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.btn{border:none;border-radius:5px;padding:10px 15px;font-weight:bold;cursor:pointer}
.btn-blue{background:#1a73e8;color:white}
.btn-gray{background:#f1f3f4;color:#333}
.filters{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
input,select{padding:10px;border:1px solid #ccc;border-radius:5px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.metric{background:#f8f9fa;border-radius:10px;padding:18px}
.metric-title{font-size:12px;color:#777;text-transform:uppercase}
.metric-value{font-size:24px;font-weight:bold;margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:12px;background:#f8f9fa;color:#777;text-transform:uppercase;font-size:12px;text-align:left;border-bottom:1px solid #ddd}
td{padding:10px 12px;border-bottom:1px solid #eee}
.section-title{font-size:20px;font-weight:bold;margin-bottom:12px}
.empty{text-align:center;color:#999;padding:25px}
.well-title{background:#e8f0fe;color:#1a73e8;padding:12px;border-radius:8px;margin:20px 0 10px;font-weight:bold}
</style>
</head>

<body>

<header>
    <div>
        <strong>📊 Inventory Report</strong>
        <div style="font-size:12px;color:#888;">Stockroom + Well sales and stock value report</div>
    </div>

    <button class="btn btn-gray" onclick="window.location='/bar/dashboard'">← Back</button>
</header>

<main>

<div class="card">
    <h2 style="margin-top:0;">Report Filters</h2>

    <div class="filters">
        <div>
            <label><b>Report Type</b></label><br>
			<select id="reportType" onchange="toggleCustomDates()">
			    <option value="DAILY">Daily</option>
			    <option value="WEEKLY">Weekly</option>
			    <option value="MONTHLY">Monthly</option>
			    <option value="QUARTERLY">Quarterly</option>
			    <option value="YEARLY">Yearly</option>
			    <option value="CUSTOM">Custom</option>
			</select>
        </div>

        <div id="dailyBox">
            <label><b>Date</b></label><br>
            <input id="reportDate" type="date">
        </div>

        <div id="fromBox" style="display:none;">
            <label><b>From Date</b></label><br>
            <input id="fromDate" type="date">
        </div>

        <div id="toBox" style="display:none;">
            <label><b>To Date</b></label><br>
            <input id="toDate" type="date">
        </div>

        <button class="btn btn-blue" onclick="loadReport()">Generate Report</button>
    </div>
</div>

<div id="reportArea" style="display:none;">

    <div class="card">
        <div class="section-title">Summary</div>

        <div class="summary">
            <div class="metric">
                <div class="metric-title">Stockroom Sales</div>
                <div class="metric-value">₹<span id="stockroomSaleTotal">0.00</span></div>
            </div>

            <div class="metric">
                <div class="metric-title">Wells Sales</div>
                <div class="metric-value">₹<span id="wellsSaleTotal">0.00</span></div>
            </div>

            <div class="metric">
                <div class="metric-title">Grand Sales Total</div>
                <div class="metric-value">₹<span id="grandSaleTotal">0.00</span></div>
            </div>

            <div class="metric">
                <div class="metric-title">Stockroom Closing Value</div>
                <div class="metric-value">₹<span id="stockroomClosingValue">0.00</span></div>
            </div>

            <div class="metric">
                <div class="metric-title">Wells Closing Value</div>
                <div class="metric-value">₹<span id="wellsClosingValue">0.00</span></div>
            </div>

            <div class="metric">
                <div class="metric-title">Total Stock Value</div>
                <div class="metric-value">₹<span id="totalClosingValue">0.00</span></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Stockroom Report</div>
        <div id="stockroomTable"></div>
    </div>

    <div class="card">
        <div class="section-title">Well-wise Report</div>
        <div id="wellReports"></div>
    </div>

</div>

</main>

<script>
function setDefaultDates(){
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('reportDate').value = today;
    document.getElementById('fromDate').value = today;
    document.getElementById('toDate').value = today;
}

function toggleCustomDates(){
    const type = document.getElementById('reportType').value;

    document.getElementById('dailyBox').style.display = type !== 'CUSTOM' ? 'block' : 'none';
    document.getElementById('fromBox').style.display = type === 'CUSTOM' ? 'block' : 'none';
    document.getElementById('toBox').style.display = type === 'CUSTOM' ? 'block' : 'none';
}

async function loadReport(){
    const type = document.getElementById('reportType').value;

    let url = '';

    if(type === 'DAILY'){
        const date = document.getElementById('reportDate').value;
        url = '/reports/inventory/daily?date=' + date;
    } else if(type === 'WEEKLY'){
        const date = document.getElementById('reportDate').value;
        url = '/reports/inventory/weekly?date=' + date;
    } else if(type === 'MONTHLY'){
        const date = document.getElementById('reportDate').value;
        url = '/reports/inventory/monthly?date=' + date;
    } else if(type === 'QUARTERLY'){
        const date = document.getElementById('reportDate').value;
        url = '/reports/inventory/quarterly?date=' + date;
    } else if(type === 'YEARLY'){
        const date = document.getElementById('reportDate').value;
        url = '/reports/inventory/yearly?date=' + date;
    } else {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        url = '/reports/inventory/custom?fromDate=' + from + '&toDate=' + to;
    }

    const res = await fetch(url);

    if(!res.ok){
        alert('Failed to load report');
        return;
    }

    const data = await res.json();
    renderReport(data);
}
function renderReport(data){
    document.getElementById('reportArea').style.display = 'block';

    document.getElementById('stockroomSaleTotal').textContent = money(data.stockroomSaleTotal);
    document.getElementById('wellsSaleTotal').textContent = money(data.wellsSaleTotal);
    document.getElementById('grandSaleTotal').textContent = money(data.grandSaleTotal);

    document.getElementById('stockroomClosingValue').textContent = money(data.stockroomClosingStockValue);
    document.getElementById('wellsClosingValue').textContent = money(data.wellsClosingStockValue);
    document.getElementById('totalClosingValue').textContent = money(data.totalClosingStockValue);

    renderStockroom(data.stockroomLines || []);
    renderWells(data.wellReports || []);
}

function renderStockroom(lines){
    const el = document.getElementById('stockroomTable');

    if(lines.length === 0){
        el.innerHTML = `<div class="empty">No stockroom records found for selected date.</div>`;
        return;
    }

    el.innerHTML = buildTable(lines);
}

function renderWells(wells){
    const el = document.getElementById('wellReports');

    if(wells.length === 0){
        el.innerHTML = `<div class="empty">No well records found for selected date.</div>`;
        return;
    }

    let html = '';

    wells.forEach(well => {
        html += `
            <div class="well-title">
                ${escapeHtml(well.wellName)}
                | Sales: ₹${money(well.wellSaleTotal)}
                | Closing Value: ₹${money(well.wellClosingStockValue)}
            </div>
        `;

        html += buildTable(well.lines || []);
    });

    el.innerHTML = html;
}

function buildTable(lines){
    let html = `
        <table>
            <thead>
            <tr>
                <th>Brand</th>
                <th>Size</th>
                <th>Opening</th>
                <th>Received</th>
                <th>Closing</th>
                <th>Sale Qty</th>
                <th>Selling Price</th>
                <th>Sale Amount</th>
                <th>Closing Value</th>
            </tr>
            </thead>
            <tbody>
    `;

    lines.forEach(l => {
        html += `
            <tr>
                <td>${escapeHtml(l.brandName)}</td>
                <td>${escapeHtml(l.sizeMl)} ml</td>
                <td>${l.openingStock}</td>
                <td>${l.receivedStock}</td>
                <td>${l.closingStock}</td>
                <td><b>${l.saleStock}</b></td>
                <td>₹${money(l.sellingPrice)}</td>
                <td>₹${money(l.saleAmount)}</td>
                <td>₹${money(l.closingStockValue)}</td>
            </tr>
        `;
    });

    html += `</tbody></table>`;
    return html;
}

function money(value){
    return Number(value || 0).toFixed(2);
}

function escapeHtml(value){
    return String(value ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
}

setDefaultDates();
loadReport();
</script>

</body>
</html>
