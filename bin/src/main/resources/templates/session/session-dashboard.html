<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Session Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Liquor Inventory Dashboard</span>
        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Current Session Dashboard</h2>

    <div class="row g-4">

        <!-- STOCKROOM -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-primary text-white"
                 style="border-radius: 16px;">
                <h3>Stockroom Inventory</h3>
                <p>Enter stockroom closing stock</p>
                <!-- ✅ barId removed from URL -->
                <a th:href="@{/stockroom/{sessionId}(sessionId=${sessionId})}"
                   class="btn btn-light">
                    Open Stockroom
                </a>
            </div>
        </div>

        <!-- DISTRIBUTION -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-warning text-dark"
                 style="border-radius: 16px;">
                <h3>Distribution</h3>
                <p>Distribute stock to wells</p>
                <!-- ✅ barId removed from URL -->
                <a th:href="@{/distribution/create-page/{sessionId}(sessionId=${sessionId})}"
                   class="btn btn-dark">
                    Open Distribution
                </a>
            </div>
        </div>

        <!-- WELL INVENTORY -->
        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-success text-white"
                 style="border-radius: 16px;">
                <h3>Well Inventory</h3>
                <p>Manage well stock</p>
                <!-- ✅ barId removed from URL -->
                <a th:href="@{/well/select/{sessionId}(sessionId=${sessionId})}"
                   class="btn btn-light">
                    Open Wells
                </a>
            </div>
        </div>

    </div>

    <!-- CLOSE SESSION -->
    <div class="mt-5 text-center">
        <form th:action="@{/sessions/close/{sessionId}(sessionId=${sessionId})}"
              method="post">
            <button class="btn btn-danger px-5">Close Session</button>
        </form>
    </div>

</div>

</body>
</html>
